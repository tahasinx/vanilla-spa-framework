<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vanilla SPA Framework with routing, validation, API helpers, plugins, and documentation demos.">
    <meta name="theme-color" content="#111827">
    <title>Custom Framework</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="resources/css/app.css">
</head>

<body>
    <a class="skip-link" href="#app">Skip to content</a>
    <main id="app" tabindex="-1">
        <!-- Content will be dynamically loaded here -->
    </main>

    <!-- Framework Core -->
    <script defer src="framework/core/Router.js"></script>
    <script defer src="framework/core/Controller.js"></script>
    <script defer src="framework/core/View.js"></script>
    <script defer src="framework/core/Api.js"></script>
    <script defer src="framework/core/Response.js"></script>
    <script defer src="framework/core/Validator.js"></script>
    <script defer src="framework/core/FormRequest.js"></script>
    <script defer src="framework/core/ServiceContainer.js"></script>
    <script defer src="framework/core/ServiceProvider.js"></script>
    <script defer src="framework/core/Store.js"></script>
    <script defer src="framework/core/Auth.js"></script>
    <script defer src="framework/core/App.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>

    <!-- Controllers -->
    <script defer src="controllers/HomeController.js"></script>
    <script defer src="controllers/DemoController.js"></script>
    <script defer src="controllers/ApiController.js"></script>
    <script defer src="controllers/ErrorController.js"></script>

    <!-- Providers & Plugins -->
    <script defer src="providers/MetricsProvider.js"></script>
    <script defer src="plugins/LoggerPlugin.js"></script>

    <!-- Routes -->
    <script defer src="routes/web.js"></script>

    <!-- Initialize App -->
    <script>
        window.addEventListener('load', function () {
            App.registerProvider(MetricsProvider);
            App.use(LoggerPlugin);
            App.init();
        });
    </script>
</body>

</html>
